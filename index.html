<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Michael's Website</title>
    <meta name="description" content="Michael (Jong Ho) Lee" />

    <!--
      Font Awesome: A popular icon library. We use it for icons like
      the GitHub logo, Google Scholar icon, RSS icon, etc.
      The "integrity" attribute is a security feature (Subresource Integrity)
      that ensures the file hasn't been tampered with.
    -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" />
  </head>
  <body>
    <!--
      This empty <div> is where the entire React app gets mounted.
      React takes over this element and renders all UI inside it.
      See src/main.tsx for where this happens.
    -->
    <div id="root"></div>

    <!--
      This <script> tag loads the app's entry point.
      type="module" tells the browser this is an ES module (supports import/export).
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
